<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hengki Setiawan | Digital Entrepreneur</title>
    <meta name="description" content="Portfolio of Hengki Setiawan - Digital Business Student, Entrepreneur, and Creative Strategist." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#2563eb', // Royal Blue 600 - Profesional & Trust
              primaryDark: '#1e40af', // Royal Blue 800
              secondary: '#0ea5e9', // Sky 500
              accent: '#f59e0b', // Amber 500 - Untuk highlight/perhatian
              light: '#f8fafc', // Slate 50 - Background utama
              surface: '#ffffff', // White - Card background
              textMain: '#0f172a', // Slate 900 - Teks utama
              textMuted: '#64748b', // Slate 500 - Teks sekunder

            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            animation: {
              'fade-in-up': 'fadeInUp 0.8s ease-out forwards',

            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          },
        },
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

      body { font-family: 'Inter', sans-serif; }
